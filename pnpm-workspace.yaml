# Workspace root + pnpm 10+/11 install policy (settings live here, not package.json).
packages: []

# Do not fail CI when Electron (etc.) lifecycle scripts are skipped.
strictDepBuilds: false

# Explicit allow/deny for postinstall scripts (Electron must not download on Railway).
allowBuilds:
  esbuild: true
  "@napi-rs/canvas": true
  electron: false
  electron-winstaller: false
