# Empty workspace root (keeps pnpm happy) + install policy for CI/Railway.
packages: []

# Only these packages may run lifecycle scripts (skips Electron binary download).
onlyBuiltDependencies:
  - esbuild
  - "@esbuild/linux-x64"
  - "@esbuild/darwin-arm64"
  - "@esbuild/darwin-x64"
  - "@esbuild/win32-x64"
  - "@napi-rs/canvas"

allowBuilds:
  esbuild: true
  "@napi-rs/canvas": true
