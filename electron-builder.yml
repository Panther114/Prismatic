# Desktop packaging only — not used on Railway / web deploy.
appId: app.prismatic.desktop
productName: Prismatic
copyright: Copyright © Prismatic
directories:
  output: release
files:
  - dist/**/*
  - server/**/*
  - electron/**/*
  - public/music-note.png
  - public/favicon.svg
  - package.json
  - node_modules/**/*
asar: true
asarUnpack:
  - server/**/*
  - node_modules/tsx/**/*
  - node_modules/esbuild/**/*
  - node_modules/@esbuild/**/*
extraMetadata:
  main: electron/main.cjs
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Prismatic
