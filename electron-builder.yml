# Desktop packaging — production NSIS installer/uninstaller
appId: app.prismatic.desktop
productName: Prismatic
copyright: Copyright © Prismatic
directories:
  output: release
  buildResources: build
# Distinct filename so a new build is never confused with an old Setup 1.0.0.exe
artifactName: "${productName}-Setup-${version}-${os}-${arch}.${ext}"
files:
  - dist/**/*
  - dist-server/**/*
  - server/**/*
  - electron/**/*
  - build/icon.png
  - build/icon.ico
  - public/music-note.png
  - public/favicon.svg
  - package.json
  - node_modules/**/*
asar: true
asarUnpack:
  - node_modules/@napi-rs/**/*
  - node_modules/@esbuild/**/*
extraMetadata:
  main: electron/main.cjs
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  # Multi-step wizard (not silent one-click) — welcome, path, progress, finish
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Prismatic
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  include: build/installer.nsh
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  uninstallDisplayName: Prismatic
