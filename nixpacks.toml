# Express serves the SPA — do not use Caddy (Nixpacks SPA path for Vite).
# https://nixpacks.com/docs/providers/node#caddy
providers = ["node"]

[variables]
NIXPACKS_SPA_CADDY = "false"

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
# Full install so Vite can build the SPA; electron/electron-builder stay
# optional peer tooling and are not required at runtime on Railway.
# Prefer frozen lockfile; fall back if lock is mid-migration.
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
# Bundle SPA + self-contained Express server (start uses node dist-server).
cmds = ["pnpm build && pnpm build:server"]

[start]
cmd = "pnpm start"
