# Express serves the SPA — do not use Caddy (Nixpacks SPA path for Vite).
# https://nixpacks.com/docs/providers/node#caddy
providers = ["node"]

[variables]
NIXPACKS_SPA_CADDY = "false"

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
# Production deps only: vite/tsx/express are in dependencies.
# Omits electron/electron-builder → no ERR_PNPM_IGNORED_BUILDS on Railway.
cmds = ["pnpm install --frozen-lockfile --prod"]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm start"
