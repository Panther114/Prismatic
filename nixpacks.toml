# Lightweight Railway host — SPA + Express only (no ffmpeg, no Electron, no Caddy).
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
# Install is owned here; do not re-run in buildCommand (avoids double work).
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm start"
