# Prismatic — one-click Railway deploy
# Video export runs entirely in the user's browser.
# The service only serves the SPA + a tiny health API (low RAM).

[build]
builder = "NIXPACKS"
# Install already runs in nixpacks install phase — only build here.
buildCommand = "pnpm build && pnpm build:server"

[deploy]
startCommand = "pnpm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Kill Vite→Caddy SPA mode; we run Node/Express (see nixpacks.toml).
# Also set this in Railway dashboard Variables if the plan still shows caddy.
# NIXPACKS_SPA_CADDY=false
